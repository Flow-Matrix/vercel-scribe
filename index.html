<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎙️ Scribe - Speech to Text</title>
  <meta name="description"
    content="Speech-to-Text powered by Google Gemini 2.5 Flash. Record audio and get instant English transcriptions." />
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>🎙️ Scribe</h1>
      <p class="subtitle">Speech-to-Text powered by Google Gemini 2.5 Flash</p>
    </header>

    <!-- API Key Card -->
    <div class="card" id="apiKeyCard">
      <h2>🔑 Enter Your Gemini API Key</h2>
      <p class="hint">Get your key from <a href="https://aistudio.google.com/app/apikey"
          target="_blank">aistudio.google.com</a></p>
      <div class="input-group">
        <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" />
        <button class="btn btn-primary" id="saveKeyBtn">Save</button>
      </div>
      <p class="status" id="keyStatus"></p>
    </div>

    <!-- Settings Card -->
    <div class="card" id="settingsSection" style="display:none">
      <h2>⚙️ Settings</h2>
      <div class="settings-grid">
        <div>
          <label for="languageSelect">Input Language</label>
          <select id="languageSelect">
            <option value="auto">Auto Detect (Hinglish/Hindi/English)</option>
            <option value="english">English Only</option>
          </select>
        </div>
        <div>
          <label for="modelSelect">Gemini Model</label>
          <select id="modelSelect">
            <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
            <option value="gemini-2.5-flash-8b">gemini-2.5-flash-8b</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Pill Recorder Card -->
    <div class="card recorder-section" id="recorderSection" style="display:none">
      <div class="pill-recorder" id="pillRecorder">
        <div class="pill-content">
          <div class="status-dot" id="statusDot"></div>
          <div class="pill-label" id="statusLabel">Ready</div>
          <div class="visualizer-container" id="visualizerContainer">
            <!-- 40 bars will be injected here via JS -->
          </div>
          <button class="pill-record-btn" id="recordBtn">🎤</button>
        </div>
      </div>
      <p class="record-status" id="recordStatus">Tap to Record</p>
    </div>

    <!-- Output Card -->
    <div class="card" id="outputSection" style="display:none">
      <h2>📝 Transcription</h2>
      <div class="output-box" id="outputText"></div>
      <div class="output-actions">
        <button class="btn btn-small" id="copyBtn">📋 Copy</button>
      </div>
    </div>

    <!-- History Card -->
    <div class="card" id="historySection" style="display:none">
      <h2>📜 Recording History</h2>
      <div id="historyList"></div>
    </div>

    <!-- Log -->
    <div class="log-box" id="logOutput"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
