<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Scribe - Speech to Text</title>
    <meta name="description" content="Free speech-to-text transcription using ElevenLabs Scribe V2">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎙️ Scribe</h1>
            <p class="subtitle">Speech-to-Text powered by ElevenLabs</p>
        </header>

        <!-- API Key Section -->
        <section class="card" id="apiKeySection">
            <h2>🔑 Enter Your API Key</h2>
            <p class="hint">Get your key from <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank">elevenlabs.io</a></p>
            <div class="input-group">
                <input type="password" id="apiKeyInput" placeholder="sk_..." autocomplete="off">
                <button id="saveKeyBtn" class="btn btn-primary">💾 Save</button>
            </div>
            <div id="keyStatus" class="status"></div>
        </section>

        <!-- Settings Section -->
        <section class="card" id="settingsSection" style="display: none;">
            <h2>⚙️ Settings</h2>
            <div class="settings-grid">
                <div>
                    <label>Language</label>
                    <select id="languageSelect">
                        <option value="en">English</option>
                        <option value="hi">Hindi</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="auto">Auto-detect</option>
                    </select>
                </div>
                <div>
                    <label>Mode</label>
                    <div class="toggle-group">
                        <button id="batchModeBtn" class="toggle-btn active">📦 Batch</button>
                        <button id="realtimeModeBtn" class="toggle-btn">⚡ Real-time</button>
                    </div>
                </div>
            </div>
            <div id="realtimeInfo" class="info-box" style="display: none;">
                ⚡ Real-time mode uses WebSocket with server-side VAD - only charged for speech, not silence!
            </div>
        </section>

        <!-- Recorder Section -->
        <section class="card recorder-section" id="recorderSection" style="display: none;">
            <button id="recordBtn" class="record-btn">🎤</button>
            <p id="recordStatus">Tap to Record</p>
        </section>

        <!-- Output Section -->
        <section class="card" id="outputSection" style="display: none;">
            <div class="output-header">
                <h2>📝 Transcription</h2>
                <button id="copyBtn" class="btn btn-small">📋 Copy</button>
            </div>
            <div id="outputText" class="output-text"></div>
        </section>

        <!-- History Section -->
        <section class="card" id="historySection" style="display: none;">
            <h2>📜 Recording History</h2>
            <ul id="historyList" class="history-list"></ul>
        </section>

        <!-- Log Section -->
        <section class="card log-section">
            <details>
                <summary>📊 Diagnostic Log</summary>
                <div id="logOutput" class="log-output"></div>
            </details>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
